<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Skill - 麦克风授权</title>
    <style>
        :root {
            --bg: #eef3f8;
            --surface: #ffffff;
            --line: #d8e2ec;
            --line-strong: #c4d3e2;

            --text: #102a43;
            --muted: #52667a;
            --muted-soft: #7b8ea4;

            --ac: #0b5fff;
            --ach: #2f80ff;
            --ac-g: rgba(11, 95, 255, 0.2);
            --ok: #1f9d68;
            --dn: #e5484d;

            --f-title: "Nunito Sans", "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --f-body: "Public Sans", "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--f-body);
            background:
                radial-gradient(circle at 88% 8%, rgba(11, 95, 255, 0.14) 0%, transparent 32%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            text-align: center;
            width: min(420px, 100%);
            padding: 26px 20px 18px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            border: 1px solid var(--line);
            backdrop-filter: blur(8px);
            box-shadow: 0 16px 30px rgba(12, 27, 61, 0.12);
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background: #f4f8fd;
            color: #3c5471;
            padding: 4px 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 10px;
            margin-bottom: 10px;
            font-family: "IBM Plex Mono", "SF Mono", Menlo, monospace;
        }

        .mic-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 14px;
            background: linear-gradient(120deg, var(--ac), var(--ach));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 31px;
            box-shadow: 0 8px 30px var(--ac-g);
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                box-shadow: 0 8px 30px var(--ac-g);
            }

            50% {
                box-shadow: 0 8px 38px var(--ac-g), 0 0 0 8px rgba(11, 95, 255, 0.09);
            }
        }

        h1 {
            font-family: var(--f-title);
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #123454;
        }

        .desc {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 18px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 13px;
            font-family: var(--f-body);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 150ms ease;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(120deg, var(--ac), var(--ach));
            color: #fff;
            box-shadow: 0 10px 20px var(--ac-g);
        }

        .btn-primary:hover {
            box-shadow: 0 12px 24px var(--ac-g);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted-soft);
            min-height: 20px;
            text-align: left;
            line-height: 1.7;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.err {
            color: var(--dn);
        }

        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted-soft);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="card">
        <p class="kicker">Permission</p>
        <div class="mic-icon">🎙️</div>
        <h1>授权麦克风访问</h1>
        <p class="desc">SOP Skill 需要麦克风权限来录制你的语音讲解。<br>点击下方按钮后，请在弹出的对话框中选择<strong>「允许」</strong>。</p>
        <button id="btn-grant" class="btn btn-primary">授予麦克风权限</button>
        <div id="status" class="status"></div>
        <div class="hint">授权后此页面会自动关闭，你可以回到侧边栏继续录制。</div>
    </div>
    <script src="mic-permission.js"></script>
</body>

</html>
